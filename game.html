    <script>
        function initializePageTransitions() {
            document.addEventListener('click', (event) => {
                const link = event.target instanceof Element ? event.target.closest('a[href]') : null;

                if (
                    !link ||
                    event.defaultPrevented ||
                    event.button !== 0 ||
                    event.metaKey ||
                    event.ctrlKey ||
                    event.shiftKey ||
                    event.altKey ||
                    link.target ||
                    link.hasAttribute('download')
                ) {
                    return;
                }

                const url = new URL(link.href, window.location.href);
                const isSamePageHash = url.pathname === window.location.pathname &&
                    url.search === window.location.search &&
                    url.hash;

                if (url.origin !== window.location.origin || isSamePageHash) {
                    return;
                }

                event.preventDefault();
                document.body.classList.add('is-page-exiting');
                window.setTimeout(() => {
                    window.location.href = url.href;
                }, 160);
            });
        }

        initializePageTransitions();

        lucide.createIcons();
        document.getElementById('year').textContent = new Date().getFullYear();

        const allowedSlugPattern = /^[a-z0-9-]+$/;
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const errorMessage = document.getElementById('error-message');
        const gamePage = document.getElementById('game-page');
        const markdownContent = document.getElementById('markdown-content');
        const pageTitle = document.getElementById('page-title');
        const pageMeta = document.getElementById('page-meta');
        const metaTags = document.getElementById('meta-tags');
        const gallery = document.getElementById('gallery');
        const galleryMainImage = document.getElementById('gallery-main-image');
        const galleryMainVideo = document.getElementById('gallery-main-video');
        const galleryFullscreenTrigger = document.getElementById('gallery-fullscreen-trigger');
        const galleryThumbnails = document.getElementById('gallery-thumbnails');
        const galleryPrev = document.getElementById('gallery-prev');
        const galleryNext = document.getElementById('gallery-next');
        const fullscreenGallery = document.getElementById('fullscreen-gallery');
        const fullscreenImage = document.getElementById('fullscreen-image');
        const fullscreenClose = document.getElementById('fullscreen-close');
        const backToTopBtn = document.getElementById('back-to-top');
        let isThumbnailDragging = false;
        let thumbnailDragStartX = 0;
        let thumbnailDragStartScrollLeft = 0;
        let suppressThumbnailClick = false;
        let thumbnailPointerId = null;

        window.addEventListener('scroll', () => {
            if (window.scrollY > 500) {
                backToTopBtn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                backToTopBtn.classList.add('opacity-100', 'translate-y-0');
            } else {
                backToTopBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                backToTopBtn.classList.remove('opacity-100', 'translate-y-0');
            }
        });

        backToTopBtn.addEventListener('click', (event) => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            event.currentTarget.blur();
        });

        function closeFullscreenGallery() {
            fullscreenGallery.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }

        function openFullscreenImage(src, alt = '') {
            if (!src) {
                return;
            }

            window.getSelection()?.removeAllRanges();

            if (document.activeElement instanceof HTMLElement) {
                document.activeElement.blur();
            }

            fullscreenImage.src = src;
            fullscreenImage.alt = alt;
            fullscreenGallery.classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        }

        fullscreenClose.addEventListener('click', (event) => {
            closeFullscreenGallery();
            event.currentTarget.blur();
        });

        fullscreenGallery.addEventListener('click', (event) => {
            if (event.target === fullscreenGallery) {
                closeFullscreenGallery();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && !fullscreenGallery.classList.contains('hidden')) {
                closeFullscreenGallery();
            }
        });

        galleryThumbnails.addEventListener('pointerdown', (event) => {
            if (event.button !== 0) {
                return;
            }

            isThumbnailDragging = true;
            suppressThumbnailClick = false;
            thumbnailPointerId = event.pointerId;
            thumbnailDragStartX = event.clientX;
            thumbnailDragStartScrollLeft = galleryThumbnails.scrollLeft;
        });

        document.addEventListener('pointermove', (event) => {
            if (!isThumbnailDragging || event.pointerId !== thumbnailPointerId) {
                return;
            }

            const dragDistance = event.clientX - thumbnailDragStartX;

            if (Math.abs(dragDistance) > 5) {
                suppressThumbnailClick = true;
            }

            galleryThumbnails.scrollLeft = thumbnailDragStartScrollLeft - dragDistance;
            event.preventDefault();
        });

        function endThumbnailDrag(event) {
            if (!isThumbnailDragging || event.pointerId !== thumbnailPointerId) {
                return;
            }

            isThumbnailDragging = false;
            thumbnailPointerId = null;

            setTimeout(() => {
                suppressThumbnailClick = false;
            }, 0);
        }

        document.addEventListener('pointerup', endThumbnailDrag);
        document.addEventListener('pointercancel', endThumbnailDrag);

        function showError(message) {
            loadingState.classList.add('hidden');
            gamePage.classList.add('hidden');
            errorMessage.textContent = message;
            errorState.classList.remove('hidden');
            lucide.createIcons();
        }

        function parseMarkdownFile(source) {
            const frontMatterMatch = source.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);
            const metadata = {};
            let body = source;

            if (frontMatterMatch) {
                body = source.slice(frontMatterMatch[0].length);

                frontMatterMatch[1].split('\n').forEach((line) => {
                    const separatorIndex = line.indexOf(':');

                    if (separatorIndex === -1) {
                        return;
                    }

                    const key = line.slice(0, separatorIndex).trim();
                    const value = line.slice(separatorIndex + 1).trim();
                    metadata[key] = value;
                });
            }

            return { metadata, body };
        }

        function renderMeta(metadata) {
            const tags = metadata.tags
                ? metadata.tags.split(',').map((tag) => tag.trim()).filter(Boolean)
                : [];

            metaTags.innerHTML = tags.map((tag) => (
                `<span class="text-xs font-mono text-neutral-300 border border-white/10 bg-black/30 px-3 py-1.5 rounded-full">${DOMPurify.sanitize(tag)}</span>`
            )).join('');

            const details = [
                metadata.year,
                metadata.role,
            ].filter(Boolean);

            pageMeta.innerHTML = details.map((detail) => (
                `<span>${DOMPurify.sanitize(detail)}</span>`
            )).join('');
        }

        function isVideoUrl(url) {
            try {
                return /\.(mp4|webm|ogg)$/i.test(new URL(url, window.location.href).pathname);
            } catch (error) {
                return /\.(mp4|webm|ogg)$/i.test(url);
            }
        }

        function getGalleryMedia(metadata) {
            const media = [];

            if (metadata.cover) {
                media.push(metadata.cover);
            }

            if (metadata.gallery) {
                media.push(...metadata.gallery.split(',').map((item) => item.trim()).filter(Boolean));
            }

            return [...new Set(media)];
        }

        function renderGallery(metadata, title) {
            const mediaItems = getGalleryMedia(metadata);
            let activeMediaIndex = 0;

            if (!mediaItems.length) {
                gallery.classList.add('hidden');
                return;
            }

            function setActiveMedia(index) {
                activeMediaIndex = (index + mediaItems.length) % mediaItems.length;
                const activeMedia = mediaItems[activeMediaIndex];
                const activeMediaIsVideo = isVideoUrl(activeMedia);

                galleryMainVideo.pause();
                galleryFullscreenTrigger.classList.toggle('hidden', activeMediaIsVideo);
                galleryMainVideo.classList.toggle('hidden', !activeMediaIsVideo);

                if (activeMediaIsVideo) {
                    galleryMainVideo.src = activeMedia;
                    galleryMainVideo.setAttribute('aria-label', `${title} gallery video ${activeMediaIndex + 1}`);
                    galleryMainImage.removeAttribute('src');
                    fullscreenImage.removeAttribute('src');
                } else {
                    galleryMainImage.src = activeMedia;
                    galleryMainImage.alt = `${title} gallery image ${activeMediaIndex + 1}`;
                    fullscreenImage.src = activeMedia;
                    fullscreenImage.alt = `${title} gallery image ${activeMediaIndex + 1}`;
                    galleryMainVideo.removeAttribute('src');
                    galleryMainVideo.load();
                }

                Array.from(galleryThumbnails.children).forEach((thumbnail, thumbnailIndex) => {
                    const isActive = thumbnailIndex === activeMediaIndex;
                    thumbnail.setAttribute('aria-current', isActive ? 'true' : 'false');

                    if (isActive) {
                        thumbnail.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
                    }
                });
            }

            galleryThumbnails.innerHTML = '';
            galleryPrev.classList.toggle('hidden', mediaItems.length <= 1);
            galleryNext.classList.toggle('hidden', mediaItems.length <= 1);
            galleryPrev.onclick = (event) => {
                setActiveMedia(activeMediaIndex - 1);
                event.currentTarget.blur();
            };
            galleryNext.onclick = (event) => {
                setActiveMedia(activeMediaIndex + 1);
                event.currentTarget.blur();
            };
            galleryFullscreenTrigger.onclick = () => openFullscreenImage(fullscreenImage.src, fullscreenImage.alt);

            mediaItems.forEach((mediaItem, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'gallery-thumbnail relative shrink-0 w-28 md:w-36 aspect-video rounded-lg overflow-hidden border border-white/10 opacity-60 hover:opacity-100 hover:border-white/50 transition-opacity focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30';
                button.setAttribute('aria-label', `Show ${title} gallery item ${index + 1}`);

                if (isVideoUrl(mediaItem)) {
                    const thumbnail = document.createElement('video');
                    thumbnail.src = mediaItem;
                    thumbnail.muted = true;
                    thumbnail.preload = 'metadata';
                    thumbnail.className = 'w-full h-full object-cover';

                    const playIcon = document.createElement('span');
                    playIcon.className = 'absolute inset-0 flex items-center justify-center text-white bg-black/20';
                    playIcon.innerHTML = '<i data-lucide="play" class="w-5 h-5"></i>';

                    button.appendChild(thumbnail);
                    button.appendChild(playIcon);
                } else {
                    const thumbnail = document.createElement('img');
                    thumbnail.src = mediaItem;
                    thumbnail.alt = '';
                    thumbnail.className = 'w-full h-full object-cover';
                    thumbnail.draggable = false;

                    button.appendChild(thumbnail);
                }

                button.addEventListener('click', (event) => {
                    if (suppressThumbnailClick) {
                        event.preventDefault();
                        suppressThumbnailClick = false;
                        return;
                    }

                    setActiveMedia(index);
                    event.currentTarget.blur();
                });
                galleryThumbnails.appendChild(button);
            });

            setActiveMedia(0);
            gallery.classList.remove('hidden');
        }

        function escapeHtml(value) {
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseCarouselImages(content) {
            return content
                .split('\n')
                .map((line) => line.trim())
                .map((line) => line.match(/^!\[([^\]]*)\]\((\S+)(?:\s+["'][^"']*["'])?\)$/))
                .filter(Boolean)
                .map((match) => ({
                    alt: match[1],
                    src: match[2],
                }));
        }

        function renderMarkdownCarousel(mediaItems) {
            if (!mediaItems.length) {
                return '';
            }

            if (mediaItems.length === 1) {
                if (isVideoUrl(mediaItems[0].src)) {
                    return `<video class="markdown-carousel-video" controls playsinline preload="metadata" src="${escapeHtml(mediaItems[0].src)}" aria-label="${escapeHtml(mediaItems[0].alt || 'Embedded video')}"></video>`;
                }

                return `![${mediaItems[0].alt}](${mediaItems[0].src})`;
            }

            const firstItem = mediaItems[0];
            const firstItemIsVideo = isVideoUrl(firstItem.src);
            const dots = mediaItems.map((item, index) => {
                const mediaType = isVideoUrl(item.src) ? 'video' : 'image';
                return `<button type="button" class="markdown-carousel-dot" aria-label="Show carousel ${mediaType} ${index + 1}" aria-current="${index === 0 ? 'true' : 'false'}" data-src="${escapeHtml(item.src)}" data-alt="${escapeHtml(item.alt)}" data-media-type="${mediaType}"></button>`;
            }).join('');

            return `
<div class="markdown-carousel">
    <div class="markdown-carousel-frame">
        <img class="markdown-carousel-media markdown-carousel-image ${firstItemIsVideo ? 'hidden' : ''}" src="${firstItemIsVideo ? '' : escapeHtml(firstItem.src)}" alt="${firstItemIsVideo ? '' : escapeHtml(firstItem.alt)}" draggable="false">
        <video class="markdown-carousel-media markdown-carousel-video ${firstItemIsVideo ? '' : 'hidden'}" controls playsinline preload="metadata" src="${firstItemIsVideo ? escapeHtml(firstItem.src) : ''}" aria-label="${firstItemIsVideo ? escapeHtml(firstItem.alt || 'Carousel video') : ''}"></video>
        <button type="button" class="markdown-carousel-button markdown-carousel-prev" aria-label="Previous carousel item">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>
        <button type="button" class="markdown-carousel-button markdown-carousel-next" aria-label="Next carousel item">
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
    </div>
    <div class="markdown-carousel-dots">${dots}</div>
</div>`;
        }

        function preprocessMarkdownCarousels(markdown) {
            return markdown.replace(/:::carousel\s*\n([\s\S]*?)\n:::/g, (match, content) => (
                renderMarkdownCarousel(parseCarouselImages(content))
            ));
        }

        function sanitizeMarkdownBodyHtml(html) {
            return DOMPurify.sanitize(html, {
                ADD_TAGS: ['video', 'source'],
                ADD_ATTR: ['playsinline', 'controls', 'preload', 'muted', 'poster', 'disablepictureinpicture', 'controlslist'],
            });
        }

        function initializeMarkdownCarousels() {
            markdownContent.querySelectorAll('.markdown-carousel').forEach((carousel) => {
                const image = carousel.querySelector('.markdown-carousel-image');
                const video = carousel.querySelector('.markdown-carousel-video');
                const previousButton = carousel.querySelector('.markdown-carousel-prev');
                const nextButton = carousel.querySelector('.markdown-carousel-next');
                const dots = Array.from(carousel.querySelectorAll('.markdown-carousel-dot'));
                let activeIndex = 0;

                if (!image || !video || !previousButton || !nextButton || dots.length < 2) {
                    return;
                }

                function setActiveMedia(index) {
                    activeIndex = (index + dots.length) % dots.length;
                    const activeDot = dots[activeIndex];
                    const mediaType = activeDot.dataset.mediaType || (isVideoUrl(activeDot.dataset.src) ? 'video' : 'image');

                    if (mediaType === 'video') {
                        image.classList.add('hidden');
                        video.classList.remove('hidden');
                        video.src = activeDot.dataset.src;
                        video.setAttribute('aria-label', activeDot.dataset.alt || 'Carousel video');
                    } else {
                        video.pause();
                        video.classList.add('hidden');
                        image.classList.remove('hidden');
                        image.src = activeDot.dataset.src;
                        image.alt = activeDot.dataset.alt || '';
                    }

                    dots.forEach((dot, dotIndex) => {
                        dot.setAttribute('aria-current', dotIndex === activeIndex ? 'true' : 'false');
                    });
                }

                previousButton.addEventListener('click', (event) => {
                    setActiveMedia(activeIndex - 1);
                    event.currentTarget.blur();
                });
                nextButton.addEventListener('click', (event) => {
                    setActiveMedia(activeIndex + 1);
                    event.currentTarget.blur();
                });

                dots.forEach((dot, dotIndex) => {
                    dot.addEventListener('click', (event) => {
                        setActiveMedia(dotIndex);
                        event.currentTarget.blur();
                    });
                });
            });
        }

        function initializeMarkdownFullscreenImages() {
            markdownContent.addEventListener('click', (event) => {
                if (event.target.closest('.markdown-carousel-button, .markdown-carousel-dot')) {
                    return;
                }

                const image = event.target.closest('img');

                if (!image || !markdownContent.contains(image)) {
                    return;
                }

                openFullscreenImage(image.currentSrc || image.src, image.alt);
            });
        }

        async function loadGamePage() {
            if (!slug || !allowedSlugPattern.test(slug)) {
                showError('Choose a project from the Selected Works grid to view its game page.');
                return;
            }

            try {
                const response = await fetch(`games/${slug}.md`);

                if (!response.ok) {
                    throw new Error(`Missing markdown file for ${slug}.`);
                }

                const source = await response.text();
                const { metadata, body } = parseMarkdownFile(source);
                const title = metadata.title || slug.replaceAll('-', ' ');

                document.title = `${title} | Kacper Malek`;
                pageTitle.textContent = title;
                renderMeta(metadata);
                renderGallery(metadata, title);

                marked.setOptions({
                    breaks: true,
                    gfm: true,
                });

                markdownContent.innerHTML = sanitizeMarkdownBodyHtml(marked.parse(preprocessMarkdownCarousels(body)));
                initializeMarkdownCarousels();
                loadingState.classList.add('hidden');
                gamePage.classList.remove('hidden');
                lucide.createIcons();
            } catch (error) {
                showError('This project page could not be loaded. Check that the matching markdown file exists in the games folder.');
            }
        }

        initializeMarkdownFullscreenImages();
        loadGamePage();
    </script>
</body>
</html>
