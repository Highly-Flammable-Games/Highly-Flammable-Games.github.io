<body class="font-sans antialiased overflow-x-hidden selection:bg-white selection:text-black" style="background-color: #000000;">

    <!-- Back To Top -->

    <header class="fixed top-0 w-full z-50">

        <div class="max-w-7xl mx-auto px-6 lg:px-12 h-20 flex items-center justify-between relative z-10">
            <a href="index.html" class="font-heading font-bold text-xl tracking-tighter text-white flex items-center gap-2">
                <i data-lucide="gamepad-2" class="w-6 h-6 text-accent-500"></i>
                KM.DEV
            </a>
            <a href="index.html#work" class="inline-flex items-center gap-2 text-sm font-medium text-neutral-400 hover:text-white transition-colors">

    <main class="min-h-screen pt-32 pb-24">
        <section class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="text-center mb-16 md:mb-24 reveal">
                <p class="text-sm uppercase tracking-[0.3em] text-neutral-500 mb-4">Archive</p>
                <h1 class="font-heading text-5xl md:text-7xl font-bold tracking-tighter text-white mb-6">Selected Works</h1>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-12 bg-dark-900/50 backdrop-blur-sm">

            <div class="font-heading font-bold text-xl tracking-tighter text-white flex items-center gap-2">

                KM.DEV
            </div>

            <p class="text-neutral-500 text-sm">© <span id="year"></span> Kacper Malek. All rights reserved.</p>

            <div class="flex items-center gap-4 text-neutral-500">
                <a href="https://github.com/vos6434" target="_blank" rel="noopener noreferrer" class="hover:text-white transition-colors p-2" aria-label="GitHub profile">

                        <path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.09.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.93.86.09-.67.35-1.12.64-1.38-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.31 9.31 0 0 1 12 7c.85 0 1.7.12 2.5.34 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.95.68 1.92 0 1.38-.01 2.5-.01 2.84 0 .27.18.59.69.49A10.08 10.08 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z"></path>
                    </svg>
                </a>
                <a href="https://www.linkedin.com/in/kacper-k-malek/" target="_blank" rel="noopener noreferrer" class="hover:text-white transition-colors p-2" aria-label="LinkedIn profile"><i data-lucide="linkedin" class="w-5 h-5"></i></a>
                <a href="https://geegeestudios.itch.io/" target="_blank" rel="noopener noreferrer" class="hover:text-white transition-colors p-2" aria-label="Itch.io profile"><i data-lucide="gamepad-2" class="w-5 h-5"></i></a>
            </div>
        </div>
    </footer>

    <script>
        function initializePageTransitions() {
            document.addEventListener('click', (event) => {
                const link = event.target instanceof Element ? event.target.closest('a[href]') : null;

                if (
                    !link ||
                    event.defaultPrevented ||
                    event.button !== 0 ||
                    event.metaKey ||
                    event.ctrlKey ||
                    event.shiftKey ||
                    event.altKey ||
                    link.target ||
                    link.hasAttribute('download')
                ) {
                    return;
                }

                const url = new URL(link.href, window.location.href);
                const isSamePageHash = url.pathname === window.location.pathname &&
                    url.search === window.location.search &&
                    url.hash;

                if (url.origin !== window.location.origin || isSamePageHash) {
                    return;
                }

                event.preventDefault();
                document.body.classList.add('is-page-exiting');
                window.setTimeout(() => {
                    window.location.href = url.href;
                }, 160);
            });
        }

        initializePageTransitions();

        lucide.createIcons();
        document.getElementById('year').textContent = new Date().getFullYear();

        const backToTopBtn = document.getElementById('back-to-top');
        const allWorksGrid = document.getElementById('all-works-grid');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 500) {
                backToTopBtn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                backToTopBtn.classList.add('opacity-100', 'translate-y-0');
            } else {
                backToTopBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                backToTopBtn.classList.remove('opacity-100', 'translate-y-0');
            }
        });

        backToTopBtn.addEventListener('click', (event) => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            event.currentTarget.blur();
        });

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseMarkdownMetadata(source) {
            const frontMatterMatch = source.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);
            const metadata = {};

            if (!frontMatterMatch) {
                return metadata;
            }

            frontMatterMatch[1].split('\n').forEach((line) => {
                const separatorIndex = line.indexOf(':');

                if (separatorIndex === -1) {
                    return;
                }

                const key = line.slice(0, separatorIndex).trim();
                const value = line.slice(separatorIndex + 1).trim();
                metadata[key] = value;
            });

            return metadata;
        }

        function isVideoUrl(url) {
            try {
                return /\.(mp4|webm|ogg)$/i.test(new URL(url, window.location.href).pathname);
            } catch (error) {
                return /\.(mp4|webm|ogg)$/i.test(url);
            }
        }

        function getCardImagesFromMetadata(metadata, fallbackCover) {
            const media = [];

            if (metadata.cover) {
                media.push(metadata.cover);
            }

            if (metadata.gallery) {
                media.push(...metadata.gallery.split(',').map((item) => item.trim()).filter(Boolean));
            }

            if (fallbackCover) {
                media.push(fallbackCover);
            }

            return [...new Set(media)].filter((item) => !isVideoUrl(item));
        }

        async function hydrateGameCardImages(games) {
            await Promise.all(games.map(async (game) => {
                try {
                    const response = await fetch(`games/${game.slug}.md`);

                    if (!response.ok) {
                        throw new Error(`Unable to load ${game.slug}.md`);
                    }

                    const metadata = parseMarkdownMetadata(await response.text());
                    game.cardImages = getCardImagesFromMetadata(metadata, game.cover);
                } catch (error) {
                    game.cardImages = [game.cover].filter(Boolean);
                }
            }));
        }

        function initializeCardImageCycling(container) {
            container.querySelectorAll('[data-card-images]').forEach((card) => {
                const primaryImage = card.querySelector('[data-card-image="primary"]');
                const secondaryImage = card.querySelector('[data-card-image="secondary"]');
                const images = JSON.parse(card.dataset.cardImages || '[]');
                let intervalId;
                let imageIndex = 0;
                let showingSecondary = false;

                if (!primaryImage || !secondaryImage || images.length < 2) {
                    return;
                }

                function showNextImage() {
                    const incomingImage = showingSecondary ? primaryImage : secondaryImage;
                    const outgoingImage = showingSecondary ? secondaryImage : primaryImage;

                    incomingImage.classList.remove('transition-none');
                    outgoingImage.classList.remove('transition-none');
                    incomingImage.classList.add('transition-opacity');
                    outgoingImage.classList.add('transition-opacity');

                    incomingImage.src = images[imageIndex];
                    incomingImage.classList.remove('opacity-0');
                    incomingImage.classList.add('opacity-80', 'group-hover:opacity-100');
                    outgoingImage.classList.add('opacity-0');
                    outgoingImage.classList.remove('opacity-80', 'group-hover:opacity-100');
                    showingSecondary = !showingSecondary;
                }

                card.addEventListener('mouseenter', () => {
                    intervalId = window.setInterval(() => {
                        imageIndex = (imageIndex + 1) % images.length;
                        showNextImage();
                    }, 1600);
                });

                card.addEventListener('mouseleave', () => {
                    window.clearInterval(intervalId);
                    intervalId = undefined;
                    imageIndex = 0;
                    primaryImage.src = images[0];
                    primaryImage.classList.add('transition-none', 'opacity-80', 'group-hover:opacity-100');
                    primaryImage.classList.remove('opacity-0');
                    secondaryImage.classList.add('transition-none', 'opacity-0');
                    secondaryImage.classList.remove('opacity-80', 'group-hover:opacity-100');
                    showingSecondary = false;
                });
            });
        }

        function renderWorkCard(game) {
            const tags = Array.isArray(game.tags) ? game.tags : [];
            const cardImages = Array.isArray(game.cardImages) && game.cardImages.length ? game.cardImages : [game.cover];
            const cardImagesAttribute = escapeHtml(JSON.stringify(cardImages));

            return `
                <a href="game.html?slug=${encodeURIComponent(game.slug)}" class="group relative reveal block rounded-2xl focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30" aria-label="View ${escapeHtml(game.title)} game page" data-card-images="${cardImagesAttribute}">
                    <div class="relative w-full aspect-video rounded-2xl overflow-hidden bg-dark-800 border border-white/5 group-hover:border-white/50 transition-colors duration-300 mb-6">
                        <img src="${escapeHtml(cardImages[0])}" alt="${escapeHtml(game.title)}" data-card-image="primary" class="absolute inset-0 w-full h-full object-cover transition-all duration-1000 ease-in-out group-hover:scale-105 opacity-80 group-hover:opacity-100 grayscale group-hover:grayscale-0">
                        <img src="${escapeHtml(cardImages[0])}" alt="" data-card-image="secondary" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out group-hover:scale-105 opacity-0 grayscale group-hover:grayscale-0">
                        <div class="absolute inset-0 bg-dark-900/20 group-hover:bg-transparent transition-colors duration-500"></div>
                    </div>
                    <div class="flex justify-between items-start gap-4">
                        <div>
                            <h3 class="font-heading text-2xl font-bold text-white mb-2">${escapeHtml(game.title)}</h3>
                            <p class="text-neutral-400 text-sm mb-4">${escapeHtml(game.summary)}</p>
                            <div class="flex flex-wrap gap-2">
                                ${tags.map((tag) => `<span class="text-xs font-mono text-neutral-500 border border-neutral-800 px-2 py-1 rounded">${escapeHtml(tag)}</span>`).join('')}
                            </div>
                        </div>
                        <span class="text-sm font-medium text-neutral-500">${escapeHtml(game.year)}</span>
                    </div>
                </a>
            `;
        }

        const revealCallback = (entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        };

        const revealObserver = new IntersectionObserver(revealCallback, {
            threshold: 0.15,
            rootMargin: '0px 0px -50px 0px',
        });

        document.querySelectorAll('.reveal').forEach((element) => {
            revealObserver.observe(element);
        });

        async function renderAllWorks() {
            try {
                const response = await fetch('games.json');

                if (!response.ok) {
                    throw new Error('Unable to load games.json');
                }

                const games = await response.json();
                await hydrateGameCardImages(games);
                allWorksGrid.innerHTML = games.map(renderWorkCard).join('');
                initializeCardImageCycling(allWorksGrid);
                allWorksGrid.querySelectorAll('.reveal').forEach((card) => revealObserver.observe(card));
                lucide.createIcons();
            } catch (error) {
                allWorksGrid.innerHTML = '<p class="text-neutral-500 text-sm">Projects could not be loaded.</p>';
            }
        }

        renderAllWorks();
    </script>
</body>
